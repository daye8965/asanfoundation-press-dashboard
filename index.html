<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #f0efea;
    --text: #1a1a19;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px;

      --bg-secondary: #242422;
      --bg-tertiary: #2c2c2a;
      --text: #f0efea;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.12);
      --border-md: rgba(255,255,255,0.22);

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text);

  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);

  .ytab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    margin-bottom: 20px;
    flex-wrap: wrap;

    border: none;

    text-align: center;

    color: var(--text-secondary);
    font-size: 12px;
    background: var(--bg-secondary);

    line-height: 1.5;

  .badge-award  { background: #EEEDFE; color: #3C3489; }

    border-radius: var(--radius-md);

    display: none;

</head>

      coverage: ['중앙일보', '매일경제', '한국경제', '세계일보', '파이낸셜뉴스', '헤럴드경제', '아시아경제', '아시아투데이', '디지털타임즈', '이데일리', '연합뉴스', '뉴시스', '스포츠조선', '뉴스토마토', '이코노믹리뷰'],
      ads: [],
    },
    2015: {
      date: '-', recipients: [],
      releases: [
        { title: '아산탄생 백주년 기념 심포지엄 지면기사', timing: 'after', date: '-', material: '보도자료+사진' },
      ],
      coverage: [], ads: [],
    },
    2014: EMPTY(),
  },
  '기타': {
    2022: EMPTY(), 2021: EMPTY(), 2020: EMPTY(), 2019: EMPTY(),
    2018: EMPTY(), 2017: EMPTY(), 2016: EMPTY(), 2015: EMPTY(), 2014: EMPTY(),
  }
};

let activeYear = 2022;
let activeEvent = '아산상';
let hintVisible = false;

function timingBadge(t) {
  if (t === 'before') return '<span class="badge badge-before">행사 전</span>';
  if (t === 'same')   return '<span class="badge badge-same">행사 당일</span>';
  if (t === 'after')  return '<span class="badge badge-after">다음날</span>';
  return `<span class="badge badge-after">${t}</span>`;
}

function renderYearTabs() {
  document.getElementById('yearTabs').innerHTML = YEARS.map(y =>
    `<button class="ytab${y === activeYear ? ' active' : ''}" onclick="setYear(${y})">${y}년</button>`
  ).join('');
}

function renderEventTabs() {
  document.getElementById('eventTabs').innerHTML = EVENTS.map(e =>
    `<button class="etab${e === activeEvent ? ' active' : ''}" onclick="setEvent('${encodeURIComponent(e)}')">${e}</button>`
  ).join('');
}

function renderContent() {
  const d = DATA[activeEvent]?.[activeYear];
  const el = document.getElementById('content');
  if (!d) { el.innerHTML = '<div class="empty-row">데이터 없음</div>'; return; }

  const isAward = HAS_RECIPIENTS.includes(activeEvent);
  const coverCnt = d.coverage.length;
  const adCnt = d.ads.length;
  const relCnt = d.releases.length;

  let html = `<div class="cards">
    <div class="card"><div class="label">행사일</div><div class="val" style="font-size:17px;padding-top:2px">${d.date}</div></div>
    <div class="card"><div class="label">보도자료 배포</div><div class="val">${relCnt}<span>건</span></div></div>
    <div class="card"><div class="label">보도 매체</div><div class="val">${coverCnt}<span>개</span></div></div>
    <div class="card"><div class="label">광고 집행 매체</div><div class="val">${adCnt}<span>개</span></div></div>
  </div>`;

  if (isAward) {
    html += `<div class="section"><div class="section-box">
      <div class="section-header"><i class="ti ti-trophy" aria-hidden="true"></i> 수상자</div>`;
    if (!d.recipients.length) {
      html += `<div class="empty-row">수상자 정보 없음 — 상단 "데이터 입력"으로 추가하세요</div>`;
    } else {
      html += `<table><thead><tr>
        <th style="width:20%">부문</th>
        <th style="width:16%">수상자</th>
        <th style="width:22%">소속</th>
        <th>수상이유</th>
      </tr></thead><tbody>`;
      d.recipients.forEach(r => {
        html += `<tr>
          <td><span class="badge badge-award">${r.category}</span></td>
          <td><strong>${r.name}</strong></td>
          <td>${r.org}</td>
          <td><span class="reason">${r.reason || '-'}</span></td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }
    html += `</div></div>`;
  }

  html += `<div class="section"><div class="section-box">
    <div class="section-header"><i class="ti ti-file-text" aria-hidden="true"></i> 보도자료 배포 현황</div>
    <div class="timing-legend">
      <span><span class="badge badge-before">행사 전</span> 행사 전날 이전 배포</span>
      <span><span class="badge badge-same">행사 당일</span> 당일 배포</span>
      <span><span class="badge badge-after">다음날</span> 익일 배포</span>
    </div>`;
  if (!d.releases.length) {
    html += `<div class="empty-row">배포 이력 없음</div>`;
  } else {
    html += `<table><thead><tr>
      <th style="width:40%">제목</th>
      <th style="width:16%">배포 시점</th>
      <th style="width:18%">배포일</th>
      <th>사용 자료</th>
    </tr></thead><tbody>`;
    d.releases.forEach(r => {
      html += `<tr>
        <td>${r.title}</td>
        <td>${timingBadge(r.timing)}</td>
        <td>${r.date}</td>
        <td>${r.material}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div></div>`;

  html += `<div class="section"><div class="section-box">
    <div class="section-header"><i class="ti ti-news" aria-hidden="true"></i> 매체 현황</div>
    <div class="media-grid">
      <div class="media-col">
        <h3><span class="dot-on" style="display:inline-block;margin-right:4px"></span> 보도 매체 (${coverCnt}개)</h3>`;
  if (!d.coverage.length) {
    html += `<div style="font-size:13px;color:var(--text-tertiary);padding:4px 0">미입력</div>`;
  } else {
    d.coverage.forEach(m => {
      html += `<div class="media-item"><span>${m}</span><span class="dot-on"></span></div>`;
    });
  }
  html += `</div><div class="media-col">
        <h3><span class="dot-ad" style="display:inline-block;margin-right:4px"></span> 광고 집행 매체 (${adCnt}개)</h3>`;
  if (!d.ads.length) {
    html += `<div style="font-size:13px;color:var(--text-tertiary);padding:4px 0">미입력</div>`;
  } else {
    d.ads.forEach(m => {
      html += `<div class="media-item"><span>${m}</span><span class="dot-ad"></span></div>`;
    });
  }
  html += `</div></div></div></div>`;

  el.innerHTML = html;
}

function openModal() {
  const isAward = HAS_RECIPIENTS.includes(activeEvent);
  document.getElementById('modalTitle').textContent = `${activeYear}년 ${activeEvent} — 데이터 입력`;
  document.getElementById('modalDesc').textContent = '아래 형식을 참고해 붙여넣기 하세요. 항목은 순서대로 입력하며, 없는 항목은 비워두면 됩니다.';
  document.getElementById('fmtHint').textContent = isAward ? FORMATS.hasRecipients : FORMATS.noRecipients;
  document.getElementById('pasteArea').value = '';
  document.getElementById('pasteMsg').className = 'msg';
  document.getElementById('pasteMsg').textContent = '';
  hintVisible = false;
  document.getElementById('fmtHint').style.display = 'none';
  document.getElementById('hintToggle').innerHTML = '<i class="ti ti-chevron-down" id="hintIcon" aria-hidden="true"></i> 입력 형식 보기';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function toggleHint() {
  hintVisible = !hintVisible;
  document.getElementById('fmtHint').style.display = hintVisible ? 'block' : 'none';
  document.getElementById('hintToggle').innerHTML = hintVisible
    ? '<i class="ti ti-chevron-up" aria-hidden="true"></i> 형식 접기'
    : '<i class="ti ti-chevron-down" aria-hidden="true"></i> 입력 형식 보기';
}

function parseTiming(s) {
  if (!s) return 'same';
  const v = s.trim();
  if (v.includes('전') || v.toLowerCase().includes('before')) return 'before';
  if (v.includes('후') || v.includes('다음') || v.toLowerCase().includes('after')) return 'after';
  return 'same';
}

function applyPaste() {
  const raw = document.getElementById('pasteArea').value.trim();
  const msgEl = document.getElementById('pasteMsg');
  if (!raw) { msgEl.className = 'msg err'; msgEl.textContent = '내용을 입력해주세요.'; return; }

  try {
    const lines = raw.split('\n');
    const result = EMPTY();
    let section = null, cur = null;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      if (line.startsWith('행사일:')) { result.date = line.slice(4).trim(); continue; }
      if (line === '[수상자]')  { if (cur && section === 'recipients') { result.recipients.push(cur); cur = null; } section = 'recipients'; continue; }
      if (line === '[보도자료]') { if (cur && section === 'recipients') { result.recipients.push(cur); cur = null; } if (cur && section === 'releases') { result.releases.push(cur); cur = null; } section = 'releases'; continue; }
      if (line === '[보도매체]') { if (cur && section === 'releases') { result.releases.push(cur); cur = null; } section = 'coverage'; continue; }
      if (line === '[광고매체]') { section = 'ads'; continue; }

      if (section === 'recipients') {
        if (line.startsWith('부문:')) { if (cur) result.recipients.push(cur); cur = { category: '', name: '', org: '', reason: '' }; cur.category = line.slice(3).trim(); }
        else if (cur && line.startsWith('이름:'))   cur.name   = line.slice(3).trim();
        else if (cur && line.startsWith('소속:'))   cur.org    = line.slice(3).trim();
        else if (cur && line.startsWith('수상이유:')) cur.reason = line.slice(5).trim();
      } else if (section === 'releases') {
        if (line.startsWith('제목:')) { if (cur) result.releases.push(cur); cur = { title: '', timing: 'same', date: '', material: '' }; cur.title = line.slice(3).trim(); }
        else if (cur && line.startsWith('배포시점:')) cur.timing   = parseTiming(line.slice(5).trim());
        else if (cur && line.startsWith('날짜:'))   cur.date     = line.split(':').slice(1).join(':').trim();
        else if (cur && line.startsWith('사용자료:')) cur.material = line.slice(5).trim();
      } else if (section === 'coverage') {
        line.split(',').map(x => x.trim()).filter(Boolean).forEach(m => result.coverage.push(m));
      } else if (section === 'ads') {
        line.split(',').map(x => x.trim()).filter(Boolean).forEach(m => result.ads.push(m));
      }
    }
    if (cur && section === 'recipients') result.recipients.push(cur);
    if (cur && section === 'releases')   result.releases.push(cur);

    if (!DATA[activeEvent]) DATA[activeEvent] = {};
    DATA[activeEvent][activeYear] = result;

    msgEl.className = 'msg ok';
    msgEl.textContent = '저장되었습니다.';
    setTimeout(() => { closeModal(); renderContent(); }, 600);
  } catch (e) {
    msgEl.className = 'msg err';
    msgEl.textContent = '입력 오류: ' + e.message;
  }
}

function setYear(y) { activeYear = y; renderYearTabs(); renderContent(); }
function setEvent(e) { activeEvent = decodeURIComponent(e); renderEventTabs(); renderContent(); }

document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderYearTabs();
renderEventTabs();
renderContent();
</script>
</body>
</html>
